name: Course records link hotfix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/course-records-link-hotfix.yml

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply course records link refinements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pages/singles/course-records.astro')
          text = path.read_text()

          text = text.replace(
              'import courseStats from "../../data/course-stats.generated.json";\n',
              'import courseStats from "../../data/course-stats.generated.json";\nimport udiscEventOverrides from "../../data/udisc-event-overrides.json";\n'
          )

          text = text.replace(
              'const backPar = pars.slice(9, 18).reduce((sum, par) => sum + Number(par || 0), 0);\n',
              'const backPar = pars.slice(9, 18).reduce((sum, par) => sum + Number(par || 0), 0);\nconst eventOverrides = udiscEventOverrides as Record<string, { date?: string; dateKey?: string; url?: string }>;\n'
          )

          text = text.replace(
              'function getScoreSortValue(value: string) {\n',
              'const websiteHrefByDateKey = new Map(rows.map((row) => [getDateKey(row.date), row.resultsHref || ""]).filter(([key, href]) => key && href));\n\nfunction getOverrideForDate(value: string) {\n  const key = getDateKey(value);\n  return key ? eventOverrides[key] : undefined;\n}\n\nfunction getScoreSortValue(value: string) {\n'
          )

          text = text.replace(
              '''      const date = String(round.date || "");
      return {
        name,
        date,
        dateDisplay: shortDate(date),
        dateKey: String(round.dateKey || getDateKey(date)),
        year: String(round.year || getRowYear(date)),
        url: String(round.url || ""),
''',
              '''      const originalDate = String(round.date || "");
      const override = getOverrideForDate(originalDate);
      const date = String(override?.date || originalDate);
      const dateKey = String(override?.dateKey || round.dateKey || getDateKey(date));
      const resultsHref = websiteHrefByDateKey.get(dateKey) || websiteHrefByDateKey.get(getDateKey(originalDate)) || "";
      const url = String(resultsHref ? "" : override?.url || round.url || "");
      return {
        name,
        date,
        dateDisplay: shortDate(date),
        dateKey,
        year: String(round.year || getRowYear(date)),
        resultsHref,
        url,
'''
          )

          date_cell = '''<td>{row.resultsHref ? <a class="date-link" href={row.resultsHref}>{row.dateDisplay}</a> : row.url ? <a class={`date-link${isUdiscUrl(row.url) ? " date-link-inline" : ""}`} href={row.url} target="_blank" rel="noopener"><span>{row.dateDisplay}</span>{isUdiscUrl(row.url) && <><img class="udisc-icon udisc-icon--light" src="https://lufberydiscgolf.com/udisc-icon.png" alt="UDisc" loading="lazy" decoding="async" /><img class="udisc-icon udisc-icon--dark" src="https://lufberydiscgolf.com/udisc-icon-white.png" alt="UDisc" loading="lazy" decoding="async" /></>}</a> : row.dateDisplay}</td>'''
          text = text.replace(
              '<td>{row.url ? <a class="date-link" href={row.url} target="_blank" rel="noopener">{row.dateDisplay}</a> : row.dateDisplay}</td>',
              date_cell
          )

          workflow = Path('.github/workflows/course-records-link-hotfix.yml')
          workflow.unlink(missing_ok=True)
          path.write_text(text)
          PY
      - name: Commit hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/singles/course-records.astro .github/workflows/course-records-link-hotfix.yml
          git commit -m "Prefer website anchors on course record links" || exit 0
          git push
