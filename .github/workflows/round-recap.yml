name: Round recap

on:
  push:
    paths:
      - "src/data/wkres.csv"
      - "src/data/hcp.csv"
      - "scripts/generate-round-recap.mjs"
      - ".github/workflows/round-recap.yml"
  workflow_dispatch:
    inputs:
      recap_type:
        description: "Which recap to generate"
        required: false
        default: latest
        type: choice
        options:
          - latest
          - handicap
          - monthly
          - 2-rounds
      event_date:
        description: "Optional event date (examples: 3/22/26 or 3/22/2026)"
        required: false
        default: ""
        type: string

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate recap
        run: |
          CMD="node scripts/generate-round-recap.mjs"

          if [ -n "${{ github.event.inputs.recap_type }}" ] && [ "${{ github.event.inputs.recap_type }}" != "latest" ]; then
            CMD="$CMD --type \"${{ github.event.inputs.recap_type }}\""
          fi

          if [ -n "${{ github.event.inputs.event_date }}" ]; then
            CMD="$CMD --date \"${{ github.event.inputs.event_date }}\""
          fi

          echo "Running: $CMD"
          eval "$CMD"

      - name: Add recap to job summary
        run: cat round-recap.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload recap artifact
        uses: actions/upload-artifact@v4
        with:
          name: round-recap
          path: round-recap.md
