name: Round recap

on:
  push:
    paths:
      - "src/data/wkres.csv"
      - "src/data/hcp.csv"
      - "scripts/generate-round-recap.mjs"
      - ".github/workflows/round-recap.yml"
  workflow_dispatch:
    inputs:
      recap_type:
        description: "Which recap to generate"
        required: false
        default: latest
        type: choice
        options:
          - latest
          - handicap
          - monthly
          - 2-rounds

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate recap
        run: |
          if [ -z "${{ github.event.inputs.recap_type }}" ] || [ "${{ github.event.inputs.recap_type }}" = "latest" ]; then
            node scripts/generate-round-recap.mjs
          else
            node scripts/generate-round-recap.mjs --type "${{ github.event.inputs.recap_type }}"
          fi

      - name: Add recap to job summary
        run: cat round-recap.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload recap artifact
        uses: actions/upload-artifact@v4
        with:
          name: round-recap
          path: round-recap.md
