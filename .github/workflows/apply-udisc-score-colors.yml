name: Apply UDisc score colors

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/apply-udisc-score-colors.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Apply UDisc score color stylesheet
        run: |
          python <<'PY'
          from pathlib import Path

          css = '''/* UDisc-style score colors used by course stats and round-history score chips. */
:root {
  --udisc-score-blue: #7098d0;
  --udisc-score-blue-text: #ffffff;
  --udisc-score-bogey: #f8d8c8;
  --udisc-score-double: #f8b088;
  --udisc-score-triple: #f88850;
  --udisc-score-orange-text: #303030;
}

html[data-theme="dark"] {
  --udisc-score-blue: #204068;
  --udisc-score-blue-text: #f8fafc;
  --udisc-score-bogey: #c08068;
  --udisc-score-double: #c86840;
  --udisc-score-triple: #b84820;
  --udisc-score-orange-text: #f8fafc;
}

@media (prefers-color-scheme: dark) {
  html[data-theme="system"] {
    --udisc-score-blue: #204068;
    --udisc-score-blue-text: #f8fafc;
    --udisc-score-bogey: #c08068;
    --udisc-score-double: #c86840;
    --udisc-score-triple: #b84820;
    --udisc-score-orange-text: #f8fafc;
  }
}

.segment--ace,
.segment--birdie,
.profile-course-segment--ace,
.profile-course-segment--birdie,
.profile-round-score--ace,
.profile-round-score--birdie,
.player-course-stats-segment--ace,
.player-course-stats-segment--birdie,
.round-score--ace,
.round-score--birdie,
.score--ace,
.score--birdie,
.score-cell--ace,
.score-cell--birdie,
[class*="score"][class*="ace"],
[class*="score"][class*="birdie"] {
  background: var(--udisc-score-blue) !important;
  color: var(--udisc-score-blue-text) !important;
}

.segment--ace span,
.segment--birdie span,
.profile-course-segment--ace span,
.profile-course-segment--birdie span,
.player-course-stats-segment--ace span,
.player-course-stats-segment--birdie span,
[class*="score"][class*="ace"] span,
[class*="score"][class*="birdie"] span {
  color: var(--udisc-score-blue-text) !important;
  text-shadow: none !important;
}

.segment--bogey,
.profile-course-segment--bogey,
.profile-round-score--bogey,
.player-course-stats-segment--bogey,
.round-score--bogey,
.score--bogey,
.score-cell--bogey,
[class*="score"][class*="bogey"]:not([class*="double"]):not([class*="triple"]) {
  background: var(--udisc-score-bogey) !important;
  color: var(--udisc-score-orange-text) !important;
}

.segment--double,
.profile-course-segment--double,
.profile-round-score--double,
.player-course-stats-segment--double,
.round-score--double,
.score--double,
.score-cell--double,
[class*="score"][class*="double"] {
  background: var(--udisc-score-double) !important;
  color: var(--udisc-score-orange-text) !important;
}

.segment--triple,
.profile-course-segment--triple,
.profile-round-score--triple,
.player-course-stats-segment--triple,
.round-score--triple,
.score--triple,
.score-cell--triple,
[class*="score"][class*="triple"] {
  background: var(--udisc-score-triple) !important;
  color: var(--udisc-score-orange-text) !important;
}

/* UDisc uses rounded squares for over-par score chips. */
.profile-round-score--bogey,
.profile-round-score--double,
.profile-round-score--triple,
.round-score--bogey,
.round-score--double,
.round-score--triple,
.score--bogey,
.score--double,
.score--triple,
.score-cell--bogey,
.score-cell--double,
.score-cell--triple,
[class*="score"][class*="bogey"],
[class*="score"][class*="double"],
[class*="score"][class*="triple"] {
  border-radius: 8px !important;
}

.segment--bogey span,
.segment--double span,
.segment--triple span,
.profile-course-segment--bogey span,
.profile-course-segment--double span,
.profile-course-segment--triple span,
.player-course-stats-segment--bogey span,
.player-course-stats-segment--double span,
.player-course-stats-segment--triple span,
[class*="score"][class*="bogey"] span,
[class*="score"][class*="double"] span,
[class*="score"][class*="triple"] span {
  color: var(--udisc-score-orange-text) !important;
  text-shadow: none !important;
}
'''

          css_path = Path('public/udisc-score-colors.css')
          css_path.write_text(css, encoding='utf-8')

          layout_path = Path('src/layouts/SiteLayout.astro')
          layout = layout_path.read_text(encoding='utf-8')
          link = '    <link rel="stylesheet" href="/udisc-score-colors.css?v=20260605b" />\n'
          if 'udisc-score-colors.css' not in layout:
            marker = '    <link rel="manifest" href="/manifest.webmanifest" />\n'
            if marker in layout:
              layout = layout.replace(marker, marker + link, 1)
            else:
              layout = layout.replace('    <meta name="theme-color"', link + '    <meta name="theme-color"', 1)
          else:
            import re
            layout = re.sub(r'href="/udisc-score-colors\.css\?v=[^"]+"', 'href="/udisc-score-colors.css?v=20260605b"', layout)
          layout_path.write_text(layout, encoding='utf-8')

          workflow_path = Path('.github/workflows/apply-udisc-score-colors.yml')
          if workflow_path.exists():
            workflow_path.unlink()
          PY

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/udisc-score-colors.css src/layouts/SiteLayout.astro .github/workflows/apply-udisc-score-colors.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Match score colors to UDisc [skip ci]"
            git push
          fi
