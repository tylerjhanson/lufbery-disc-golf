name: Round history profile hotfix

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/round-history-hotfix.yml

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply profile round history refinements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/pages/singles/players/[slug].astro')
          text = path.read_text()

          text = text.replace(
              '.profile-round-table thead tr:first-child th { border-bottom: 0; font-size: 0.78rem; font-weight: 950; }\n'
              '    .profile-round-table thead tr:nth-child(2) th { padding-top: 3px; font-size: 0.68rem; font-weight: 700; }\n'
              '    .profile-round-table th { color: var(--muted, #6b7280); font-size: 0.73rem; font-weight: 850; }',
              '.profile-round-table thead tr:first-child th, .profile-round-table thead tr:first-child .profile-round-sort { border-bottom: 0; color: var(--text, #111827) !important; font-size: 0.78rem; font-weight: 950; }\n'
              '    .profile-round-table thead tr:nth-child(2) th { padding-top: 3px; color: var(--muted, #6b7280); font-size: 0.68rem; font-weight: 700; }\n'
              '    .profile-round-table th { color: var(--muted, #6b7280); font-size: 0.73rem; font-weight: 850; }'
          )

          text = text.replace(
              '<tr><th>Par</th><th>{formatToPar(0)}</th>{coursePars.map((par) => <th>{par}</th>)}<th>{coursePars.reduce((sum, par) => sum + Number(par || 0), 0)}</th></tr>',
              '<tr><th></th><th></th>{coursePars.map((par) => <th>{par}</th>)}<th>{coursePars.reduce((sum, par) => sum + Number(par || 0), 0)}</th></tr>'
          )

          text = text.replace(
              'html[data-theme="dark"] .profile-round-panel-hole { color: var(--text, #f8fafc); }',
              'html[data-theme="dark"] .profile-round-panel-hole { color: var(--text, #f8fafc); }\n'
              '    html[data-theme="dark"] .profile-round-score--bogey, html[data-theme="dark"] .profile-round-score--double, html[data-theme="dark"] .profile-round-score--triple { color: #1f2937 !important; }'
          )

          text = text.replace(
              'html[data-theme="system"] .profile-round-panel-hole { color: var(--text, #f8fafc); }',
              'html[data-theme="system"] .profile-round-panel-hole { color: var(--text, #f8fafc); }\n'
              '      html[data-theme="system"] .profile-round-score--bogey, html[data-theme="system"] .profile-round-score--double, html[data-theme="system"] .profile-round-score--triple { color: #1f2937 !important; }'
          )

          text = text.replace(
              '      .profile-round-table th, .profile-round-table td { padding: 6px 3px; font-size: 0.68rem; }\n'
              '      .profile-round-table th:first-child, .profile-round-table td:first-child { width: 62px; }\n'
              '      .profile-round-score { min-width: 22px; height: 22px; padding: 0 4px; font-size: 0.7rem; }',
              '      .profile-round-table th, .profile-round-table td { padding: 5px 1px; font-size: 0.66rem; letter-spacing: -0.025em; }\n'
              '      .profile-round-table th:first-child, .profile-round-table td:first-child { width: 54px; }\n'
              '      .profile-round-table th:nth-child(2), .profile-round-table td:nth-child(2), .profile-round-table th:last-child, .profile-round-table td:last-child { width: 34px; font-size: 0.66rem; }\n'
              '      .profile-round-table thead tr:first-child th, .profile-round-table thead tr:first-child .profile-round-sort { font-size: 0.66rem; }\n'
              '      .profile-round-table thead tr:nth-child(2) th { font-size: 0.58rem; }\n'
              '      .profile-round-score { min-width: 20px; height: 20px; padding: 0 3px; font-size: 0.66rem; }'
          )

          text = text.replace(
              '            const result = typeof av === "string" ? av.localeCompare(bv) : av - bv;\n'
              '            return roundSort.direction === "asc" ? result : -result;',
              '            const primary = typeof av === "string" ? av.localeCompare(bv) : av - bv;\n'
              '            if (primary) return roundSort.direction === "asc" ? primary : -primary;\n'
              '            return String(b.dataset.sortDate || "").localeCompare(String(a.dataset.sortDate || ""));'
          )

          path.write_text(text)

          workflow = Path('.github/workflows/round-history-hotfix.yml')
          workflow.unlink(missing_ok=True)
          PY
      - name: Commit hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/pages/singles/players/[slug].astro .github/workflows/round-history-hotfix.yml
          git commit -m "Refine round history table styling" || exit 0
          git push
